name: my_petition_app
description: "My Petition - Publish Your Own Petition"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  pin_code_fields: ^8.0.1
  change_app_package_name: ^1.5.0
  rename_app: ^1.6.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/


flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/icon.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/icons/icon.png
  android: true
  ios: true
  fullscreen: true

  android_12:
    color: "#ffffff"
    image: assets/icons/icon.png


