name: my_petition_app
description: "My Petition - Publish Your Own Petition"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  pin_code_fields: ^8.0.1
  change_app_package_name: ^1.5.0
  rename_app: ^1.6.5
  get: ^4.6.6
  get_storage: ^2.1.1
  flutter_secure_storage: ^9.2.2
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_hive_store: ^3.2.2
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.1
  device_info_plus: ^11.1.2
  fluttertoast: ^8.2.10
  cached_network_image: ^3.4.1
  package_info_plus: ^8.1.2
  image_picker: ^1.1.2
  logger: ^2.5.0
  hive: ^2.2.3
  intl: ^0.19.0
  flutter_svg: ^2.0.17
  url_launcher: ^6.3.1
  shimmer: ^3.0.0
  permission_handler: ^11.3.1
  font_awesome_flutter: ^10.7.0
  uuid: ^4.4.0
  android_id: ^0.4.1
  iconsax: ^0.0.8
  flutter_native_splash: ^2.4.0
  flutter_widget_from_html: ^0.17.2
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/


flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/icon.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/icons/icon.png
  android: true
  ios: true
  fullscreen: true

  android_12:
    color: "#ffffff"
    image: assets/icons/icon.png


